name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get (workspace)
        run: flutter pub get

      - name: Format
        run: dart format --set-exit-if-changed packages apps

      - name: Analyze
        run: flutter analyze packages apps

      - name: Domain tests
        run: dart test
        working-directory: packages/domain

      - name: Merchant tests
        run: flutter test
        working-directory: apps/merchant

      - name: Customer tests
        run: flutter test
        working-directory: apps/customer

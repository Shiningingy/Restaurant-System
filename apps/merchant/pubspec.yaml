name: merchant
description: "Restaurant System — merchant POS app (order taking, printing, payments, reports)."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  go_router: ^17.0.0
  http: ^1.2.0
  intl: ^0.20.0
  restaurant_domain:
    path: ../../packages/domain
  shared_preferences: ^2.5.0

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

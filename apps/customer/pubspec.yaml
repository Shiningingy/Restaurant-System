name: customer
description: "Restaurant System — customer app (browse menu, preorder for pickup)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  file_selector: ^1.0.0
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^3.0.0
  http: ^1.2.0
  image: ^4.2.0
  intl: ^0.20.0
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  restaurant_domain:
    path: ../../packages/domain
  shared_preferences: ^2.5.0
  zxing2: ^0.2.3
  local_notifier: ^0.1.6

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  # Used only by tests to render a QR image for the decode round-trip.
  qr: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

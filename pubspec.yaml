name: restaurant_system_workspace
description: Pub workspace root for the Restaurant System monorepo.
publish_to: none

environment:
  sdk: ^3.12.0

workspace:
  - packages/domain
  - packages/ui
  - apps/merchant
  - apps/customer

# Build the bundled SQLite with the Multiple Ciphers extension so the merchant
# database can be encrypted at rest (SQLCipher-compatible, bundled crypto — no
# OpenSSL, builds cleanly on Windows). Drift opens it with `PRAGMA key`.
hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc
